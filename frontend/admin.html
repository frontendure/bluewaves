<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Admin | Blue Waves</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
    
    /* Login Styles */
    #loginSection { min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: var(--dark-bg); }
    .premium-box { border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    /* Dashboard Styles */
    .sidebar { min-height: 100vh; background-color: var(--dark-bg); color: white; padding-top: 20px;}
    .sidebar a, .sidebar button.nav-link { color: rgba(255,255,255,0.7); text-decoration: none; padding: 15px 20px; display: block; transition: 0.3s; border-radius: 0; width: 100%; text-align: left; }
    .sidebar button.nav-link:hover, .sidebar button.nav-link.active { background-color: var(--primary); color: white; }
    .content-area { padding: 40px; background-color: #f8f9fa; min-height: 100vh;}
    .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto;}
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './js/supabase-config.js';

    // Make supabase global so our script tags can use it
    window.supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { storageKey: 'bluewaves-auth', storage: window.localStorage }
    });
  </script>
</head>
<body>

  <!-- ============================== -->
  <!-- LOGIN SECTION                  -->
  <!-- ============================== -->
  <div id="loginSection" class="d-none">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="premium-box bg-white p-5 text-center position-relative">
            <i class="bi bi-shield-lock text-primary fs-1 mb-3 d-inline-block"></i>
            <h3 class="mb-4 text-dark" style="font-family: 'Playfair Display', serif;">Staff Portal</h3>
            
            <form id="loginForm" class="text-start">
              <div class="form-group mb-4">
                <label for="email" class="text-muted">Admin Email</label>
                <input type="email" class="form-control" id="email" required>
              </div>
              <div class="form-group mb-5">
                <label for="password" class="text-muted">Password</label>
                <input type="password" class="form-control" id="password" required>
              </div>
              <div id="error-msg" class="alert alert-danger d-none" style="font-size: 0.85rem;"></div>
              <button type="submit" class="btn btn-brand w-100 mb-3" id="loginBtn">Secure Login</button>
              <a href="index.html" class="d-block text-center text-muted small text-decoration-none">Return to Main Site</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>


  <!-- ============================== -->
  <!-- DASHBOARD SECTION              -->
  <!-- ============================== -->
  <div id="dashboardSection" class="d-none d-flex">
    
    <!-- Sidebar -->
    <div class="sidebar" style="width: 250px;">
      <h4 class="text-center mb-4 mt-3 text-white" style="font-family: 'Playfair Display', serif;">CMS Admin</h4>
      <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist">
        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#v-pills-slots" type="button" role="tab"><i class="bi bi-clock me-2"></i> Schedule</button>
        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#v-pills-programs" type="button" role="tab"><i class="bi bi-journal-text me-2"></i> Programs</button>
        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#v-pills-memberships" type="button" role="tab"><i class="bi bi-card-checklist me-2"></i> Memberships</button>
        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#v-pills-gallery" type="button" role="tab"><i class="bi bi-images me-2"></i> Gallery</button>
      </div>
      <button id="logoutBtn" class="btn btn-outline-light m-3 position-absolute bottom-0" style="width: 200px;">Logout</button>
    </div>

    <!-- Content -->
    <div class="content-area flex-grow-1">
      <div class="tab-content">
        
        <!-- SLOTS -->
        <div class="tab-pane fade show active" id="v-pills-slots" role="tabpanel">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Schedule Slots</h2>
            <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#slotModal" onclick="resetSlotForm()">+ Add Slot</button>
          </div>
          <div class="card"><div class="card-body">
            <table class="table table-hover">
              <thead><tr><th>Time</th><th>Name</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody id="slotsTableBody"><tr><td colspan="4"><div class="loader"></div></td></tr></tbody>
            </table>
          </div></div>
        </div>

        <!-- PROGRAMS -->
        <div class="tab-pane fade" id="v-pills-programs" role="tabpanel">
           <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Programs</h2>
            <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#programModal" onclick="resetProgramForm()">+ Add Program</button>
          </div>
          <div class="row" id="programsGrid"><div class="col-12"><div class="loader"></div></div></div>
        </div>

        <!-- MEMBERSHIPS -->
        <div class="tab-pane fade" id="v-pills-memberships" role="tabpanel">
           <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Memberships</h2>
            <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#membershipModal" onclick="resetMembershipForm()">+ Add Membership</button>
          </div>
          <div class="row" id="membershipsGrid"><div class="col-12"><div class="loader"></div></div></div>
        </div>

        <!-- GALLERY -->
        <div class="tab-pane fade" id="v-pills-gallery" role="tabpanel">
           <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gallery</h2>
            <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#galleryModal">+ Upload Image</button>
          </div>
          <div class="row g-3" id="galleryGrid"><div class="col-12"><div class="loader"></div></div></div>
        </div>

      </div>
    </div>
  </div>

  <!-- ============================== -->
  <!-- MODALS                         -->
  <!-- ============================== -->
  <div class="modal fade" id="slotModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Add/Edit Slot</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="mb-3"><label>Time (e.g. 06:00 AM)</label><input type="text" class="form-control" id="slotTime"></div>
      <div class="mb-3"><label>Name</label><input type="text" class="form-control" id="slotName"></div>
      <div class="mb-3"><label>Status</label><select class="form-control" id="slotStatus"><option value="Open">Open</option><option value="Few Slots">Few Slots</option><option value="Full">Full</option></select></div>
    </div>
    <div class="modal-footer"><button type="button" class="btn btn-brand w-100" id="saveSlotBtn">Save</button></div>
  </div></div></div>

  <div class="modal fade" id="programModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Add Program</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="mb-3"><label>Title</label><input type="text" class="form-control" id="progTitle"></div>
      <div class="mb-3"><label>Ages (e.g. Ages 16+)</label><input type="text" class="form-control" id="progAges"></div>
      <div class="mb-3"><label>Description</label><textarea class="form-control" id="progDesc" rows="3"></textarea></div>
      <div class="mb-3"><label>Image URL</label><input type="text" class="form-control" id="progImage"></div>
    </div>
    <div class="modal-footer"><button type="button" class="btn btn-brand w-100" id="saveProgramBtn">Save</button></div>
  </div></div></div>

  <div class="modal fade" id="membershipModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Add Membership</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="mb-3"><label>Tier Name</label><input type="text" class="form-control" id="memName"></div>
      <div class="mb-3"><label>Subtitle</label><input type="text" class="form-control" id="memSub"></div>
      <div class="mb-3"><label>Price</label><input type="text" class="form-control" id="memPrice"></div>
      <div class="mb-3"><label>Unit (/mo)</label><input type="text" class="form-control" id="memUnit"></div>
      <div class="mb-3"><label>Popular?</label><input type="checkbox" class="form-check-input ms-2" id="memPopular"></div>
      <div class="mb-3"><label>Features (Comma separated)</label><textarea class="form-control" id="memFeatures"></textarea></div>
    </div>
    <div class="modal-footer"><button type="button" class="btn btn-brand w-100" id="saveMembershipBtn">Save</button></div>
  </div></div></div>

  <div class="modal fade" id="galleryModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Upload Image</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="mb-3"><label>Select Image</label><input type="file" class="form-control" id="galleryFile" accept="image/*"></div>
      <div class="mb-3"><label>Alt Text</label><input type="text" class="form-control" id="galleryAlt"></div>
    </div>
    <div class="modal-footer"><button type="button" class="btn btn-brand w-100" id="uploadGalleryBtn">Upload</button></div>
  </div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    // Wait for Supabase to be attached to window
    const checkSupabase = setInterval(async () => {
      if(window.supabase) {
        clearInterval(checkSupabase);
        initAuth();
      }
    }, 100);

    // ==========================================
    // AUTHENTICATION LOGIC
    // ==========================================
    async function initAuth() {
      const loginSection = document.getElementById('loginSection');
      const dashboardSection = document.getElementById('dashboardSection');
      
      // Check session on load
      const { data } = await window.supabase.auth.getSession();
      if (data.session) {
        loginSection.classList.add('d-none');
        dashboardSection.classList.remove('d-none');
        loadAllData();
      } else {
        loginSection.classList.remove('d-none');
      }

      // Handle Login
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        const btn = document.getElementById('loginBtn');

        btn.innerText = 'Authenticating...';
        const { error } = await window.supabase.auth.signInWithPassword({ email, password });
        
        if (error) {
          btn.innerText = 'Secure Login';
          errorMsg.classList.remove('d-none');
          errorMsg.innerText = error.message;
        } else {
          loginSection.classList.add('d-none');
          dashboardSection.classList.remove('d-none');
          loadAllData();
        }
      });

      // Handle Logout
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await window.supabase.auth.signOut();
        dashboardSection.classList.add('d-none');
        loginSection.classList.remove('d-none');
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
      });
    }

    // ==========================================
    // DASHBOARD LOGIC
    // ==========================================
    function loadAllData() {
      loadSlots();
      loadPrograms();
      loadMemberships();
      loadGallery();
    }

    // --- SLOTS ---
    async function loadSlots() {
      const tbody = document.getElementById('slotsTableBody');
      const { data } = await window.supabase.from('slots').select('*').order('order_val');
      tbody.innerHTML = '';
      if(!data || data.length === 0) return tbody.innerHTML = '<tr><td colspan="4">No slots found.</td></tr>';
      data.forEach(item => {
        let sc = item.status === 'Open' ? 'bg-success' : item.status === 'Full' ? 'bg-danger' : 'bg-warning text-dark';
        tbody.innerHTML += `<tr><td>${item.time}</td><td>${item.name}</td><td><span class="badge ${sc}">${item.status}</span></td><td><button class="btn btn-sm btn-outline-danger" onclick="deleteSlot(${item.id})">Delete</button></td></tr>`;
      });
    }
    document.getElementById('saveSlotBtn').addEventListener('click', async () => {
      await window.supabase.from('slots').insert([{ 
        time: document.getElementById('slotTime').value, 
        name: document.getElementById('slotName').value, 
        status: document.getElementById('slotStatus').value, 
        order_val: Date.now() 
      }]);
      bootstrap.Modal.getInstance(document.getElementById('slotModal')).hide();
      loadSlots();
    });
    window.deleteSlot = async (id) => { if(confirm("Delete?")) { await window.supabase.from('slots').delete().eq('id', id); loadSlots(); }};
    window.resetSlotForm = () => { document.getElementById('slotTime').value = ''; document.getElementById('slotName').value = ''; };

    // --- PROGRAMS ---
    async function loadPrograms() {
      const grid = document.getElementById('programsGrid');
      const { data } = await window.supabase.from('programs').select('*').order('order_val');
      grid.innerHTML = '';
      if(!data || data.length === 0) return grid.innerHTML = '<div class="col-12">No programs found.</div>';
      data.forEach(item => {
        grid.innerHTML += `<div class="col-md-4 mb-3"><div class="card h-100"><img src="${item.image}" style="height:150px;object-fit:cover;"><div class="card-body"><h6>${item.ages}</h6><h5>${item.title}</h5><button class="btn btn-sm btn-outline-danger w-100" onclick="deleteProg(${item.id})">Delete</button></div></div></div>`;
      });
    }
    document.getElementById('saveProgramBtn').addEventListener('click', async () => {
      await window.supabase.from('programs').insert([{ 
        title: document.getElementById('progTitle').value, ages: document.getElementById('progAges').value, 
        "desc": document.getElementById('progDesc').value, image: document.getElementById('progImage').value || 'https://via.placeholder.com/800x500', 
        order_val: Date.now() 
      }]);
      bootstrap.Modal.getInstance(document.getElementById('programModal')).hide();
      loadPrograms();
    });
    window.deleteProg = async (id) => { if(confirm("Delete?")) { await window.supabase.from('programs').delete().eq('id', id); loadPrograms(); }};
    window.resetProgramForm = () => { document.getElementById('progTitle').value = ''; document.getElementById('progDesc').value=''; document.getElementById('progAges').value=''; document.getElementById('progImage').value=''; };

    // --- MEMBERSHIPS ---
    async function loadMemberships() {
      const grid = document.getElementById('membershipsGrid');
      const { data } = await window.supabase.from('memberships').select('*').order('order_val');
      grid.innerHTML = '';
      if(!data || data.length === 0) return grid.innerHTML = '<div class="col-12">No memberships.</div>';
      data.forEach(item => {
        grid.innerHTML += `<div class="col-md-4 mb-3"><div class="card h-100 text-center ${item.popular ? 'border-primary' : ''}"><div class="card-body"><h5>${item.name}</h5><h2>${item.price}</h2><button class="btn btn-sm btn-outline-danger w-100" onclick="deleteMem(${item.id})">Delete</button></div></div></div>`;
      });
    }
    document.getElementById('saveMembershipBtn').addEventListener('click', async () => {
      const features = JSON.stringify(document.getElementById('memFeatures').value.split(',').map(f => f.trim()));
      await window.supabase.from('memberships').insert([{ 
        name: document.getElementById('memName').value, subtitle: document.getElementById('memSub').value, 
        price: document.getElementById('memPrice').value, unit: document.getElementById('memUnit').value, 
        popular: document.getElementById('memPopular').checked, features, order_val: Date.now() 
      }]);
      bootstrap.Modal.getInstance(document.getElementById('membershipModal')).hide();
      loadMemberships();
    });
    window.deleteMem = async (id) => { if(confirm("Delete?")) { await window.supabase.from('memberships').delete().eq('id', id); loadMemberships(); }};
    window.resetMembershipForm = () => { document.getElementById('memName').value = ''; document.getElementById('memPrice').value=''; document.getElementById('memFeatures').value=''; };

    // --- GALLERY ---
    async function loadGallery() {
      const grid = document.getElementById('galleryGrid');
      const { data } = await window.supabase.from('gallery').select('*').order('order_val');
      grid.innerHTML = '';
      if(!data || data.length === 0) return grid.innerHTML = '<div class="col-12">No images.</div>';
      data.forEach(item => {
        grid.innerHTML += `<div class="col-md-3"><div class="card"><img src="${item.url}" style="height:120px;object-fit:cover;"><div class="card-body p-2"><button class="btn btn-sm btn-outline-danger w-100" onclick="deleteGal(${item.id})">Delete</button></div></div></div>`;
      });
    }
    document.getElementById('uploadGalleryBtn').addEventListener('click', async () => {
      const file = document.getElementById('galleryFile').files[0];
      if(!file) return alert("Select file!");
      const btn = document.getElementById('uploadGalleryBtn');
      btn.innerText = "Uploading...";
      
      const fileName = Date.now() + '_' + file.name;
      const { error: uploadErr } = await window.supabase.storage.from('gallery').upload(fileName, file);
      if(uploadErr) return alert("Upload failed: " + uploadErr.message);
      
      const { data: { publicUrl } } = window.supabase.storage.from('gallery').getPublicUrl(fileName);
      await window.supabase.from('gallery').insert([{ url: publicUrl, alt: document.getElementById('galleryAlt').value, order_val: Date.now() }]);
      
      bootstrap.Modal.getInstance(document.getElementById('galleryModal')).hide();
      btn.innerText = "Upload";
      loadGallery();
    });
    window.deleteGal = async (id) => { if(confirm("Delete?")) { await window.supabase.from('gallery').delete().eq('id', id); loadGallery(); }};

  </script>
</body>
</html>
