<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Portal | Blue Waves</title>
  
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">

  <!-- Firebase SDK Modules (via CDN) -->
  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
    
    // Import your config
    import { firebaseConfig } from './js/firebase-config.js';

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Make available globally for inline script
    window.auth = auth;
    window.signInWithEmailAndPassword = signInWithEmailAndPassword;
  </script>
</head>
<body class="bg-dark" style="min-height: 100vh; display: flex; flex-direction: column;">

  <!-- NAVBAR (Simplified) -->
  <header>
    <nav class="navbar custom-nav p-4">
      <div class="container d-flex justify-content-center">
        <a class="navbar-brand d-flex align-items-center gap-3 m-0" href="index.html">
          <span class="brand-text text-white">BLUE WAVES</span>
        </a>
      </div>
    </nav>
  </header>

  <main class="flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="premium-box bg-white p-5 shadow-lg text-center" style="border-radius: 4px; position: relative;">
            <i class="bi bi-shield-lock text-primary fs-1 mb-3 d-inline-block"></i>
            <h3 class="mb-4 text-dark" style="font-family: 'Playfair Display', serif;">Staff Portal</h3>
            
            <form id="loginForm" class="custom-form text-start">
              <div class="form-group mb-4">
                <label for="email" class="text-muted">Admin Email</label>
                <input type="email" class="form-control" id="email" required>
              </div>
              <div class="form-group mb-5">
                <label for="password" class="text-muted">Password</label>
                <input type="password" class="form-control" id="password" required>
              </div>
              
              <div id="error-msg" class="alert alert-danger d-none" style="font-size: 0.85rem;"></div>

              <button type="submit" class="btn btn-brand w-100 mb-3" id="loginBtn">Secure Login</button>
              <a href="index.html" class="d-block text-center text-muted small text-decoration-none hover-primary">Return to Main Site</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Handle Login
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      const btn = document.getElementById('loginBtn');

      btn.innerText = 'Authenticating...';
      btn.disabled = true;

      // Ensure Firebase loaded
      if(window.auth) {
        window.signInWithEmailAndPassword(window.auth, email, password)
          .then((userCredential) => {
            // Signed in 
            const user = userCredential.user;
            btn.innerText = 'Success!';
            // Redirect to a dashboard page (to be created later)
            alert("Login successful. Welcome " + user.email);
            window.location.href = 'index.html'; // Temp redirect
          })
          .catch((error) => {
            btn.innerText = 'Secure Login';
            btn.disabled = false;
            errorMsg.classList.remove('d-none');
            errorMsg.innerText = "Invalid credentials or missing Firebase Config. Check console.";
            console.error("Firebase Auth Error:", error.code, error.message);
          });
      } else {
        // Fallback if firebase didn't load
        setTimeout(() => {
          btn.innerText = 'Secure Login';
          btn.disabled = false;
          errorMsg.classList.remove('d-none');
          errorMsg.innerText = "Firebase not initialized. Please configure js/firebase-config.js";
        }, 1000);
      }
    });
  </script>
</body>
</html>
